---
# Pulls EC2 metadata (region, placement zone) so subsequent lookups know where
# this host lives. The `amazon.aws.aws_secret` lookup uses ansible_ec2_placement_region
# below.
- amazon.aws.ec2_metadata_facts:

# Two-bucket secrets pattern: secrets we manage by Terraform (rotation, IAM) vs.
# external/unmanaged values (Stripe keys, third-party tokens) that humans paste
# in. Keeping them in distinct Secrets Manager entries makes audit trails legible.
- name: Fetch managed secrets from AWS Secrets Manager
  set_fact:
    secrets: >-
      {{ lookup('amazon.aws.aws_secret', 'orbit/app',
        region=ansible_ec2_placement_region) }}

- name: Fetch unmanaged secrets from AWS Secrets Manager
  set_fact:
    unmanaged_secrets: >-
      {{ lookup('amazon.aws.aws_secret', 'orbit/app_unmanaged',
        region=ansible_ec2_placement_region) }}

# Deployment script (copied to the host) emits a JSON banner per container at
# startup, so CloudWatch logs always identify which image tag is running.
- name: Create scripts directory
  become_user: ec2-user
  file:
    path:  /app/scripts
    state: directory
    mode:  "0755"

- name: Copy deployment logging script
  become_user: ec2-user
  copy:
    src:   "{{ playbook_dir }}/scripts/log-deployment.sh"
    dest:  /app/scripts/log-deployment.sh
    mode:  "0755"
    force: true

# Render docker-compose.yaml from the role template using all the facts +
# secrets gathered above.
- name: Template docker-compose config
  become_user: ec2-user
  template:
    src:   docker-compose.yaml
    dest:  /app/docker-compose.yaml
    force: true

# Audit trail: before overwriting deployment-info, snapshot the previous tag so
# we can recover what was running pre-deploy.
- name: Check if deployment-info exists
  become_user: ec2-user
  stat:
    path: /app/deployment-info
  register: deployment_info_stat

- name: Read previous deployment tag
  become_user: ec2-user
  shell: |
    if [ -f /app/deployment-info ]; then
      grep "^CURRENT_TAG=" /app/deployment-info | cut -d'=' -f2 | tr -d '"'
    else
      echo "N/A (first deployment)"
    fi
  register: previous_tag
  changed_when: false

- name: Read previous environment
  become_user: ec2-user
  shell: |
    if [ -f /app/deployment-info ]; then
      grep "^CURRENT_ENVIRONMENT=" /app/deployment-info | cut -d'=' -f2 | tr -d '"'
    else
      echo "N/A"
    fi
  register: previous_environment
  changed_when: false

- name: Write deployment-info file (current + previous)
  become_user: ec2-user
  copy:
    dest:  /app/deployment-info
    force: true
    content: |
      # Auto-generated by Ansible at {{ ansible_date_time.iso8601 }}
      CURRENT_ENVIRONMENT="{{ app_environment }}"
      CURRENT_TAG="{{ image_tag }}"
      CURRENT_DEPLOYMENT_DATE="{{ ansible_date_time.iso8601 }}"
      PREVIOUS_ENVIRONMENT="{{ previous_environment.stdout }}"
      PREVIOUS_TAG="{{ previous_tag.stdout }}"

- name: Pull images
  become_user: ec2-user
  community.docker.docker_compose_v2_pull:
    project_src: /app

- name: Start docker services
  become_user: ec2-user
  community.docker.docker_compose_v2:
    project_src:  /app
    wait:         true
    wait_timeout: 600

- name: Clean unused Docker images
  become_user: ec2-user
  shell: docker image prune -af
